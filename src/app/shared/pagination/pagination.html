<nav>
  <ul class="flex justify-center mt-4 gap-2">
    <li>
      <button
        type="button"
        class="px-4 py-2 text-black border border-gray-400 rounded cursor-pointer hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="changePage(1)"
        [disabled]="currentPage() === 1"
      >
        <i class="bx bx-first"></i>
      </button>
    </li>

    <li>
      <button
        type="button"
        class="px-4 py-2 text-black border border-gray-400 rounded cursor-pointer hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="changePage(currentPage() - 1)"
        [disabled]="currentPage() === 1"
      >
        <i class="bx bx-chevron-left"></i>
      </button>
    </li>

    @for (page of pages(); track page) {
      <li>
        <button
          type="button"
          class="px-3 py-2 rounded border border-gray-400 cursor-pointer"
          [class.bg-black]="page === currentPage()"
          [class.text-white]="page === currentPage()"
          [class.text-black]="page !== currentPage()"
          [class.hover:bg-gray-100]="page !== currentPage()"
          (click)="changePage(page)"
        >
          {{ page }}
        </button>
      </li>
    }

    <li>
      <button
        type="button"
        class="px-4 py-2 text-black border border-gray-400 rounded cursor-pointer hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="changePage(currentPage() + 1)"
        [disabled]="currentPage() === totalPages()"
      >
        <i class="bx bx-chevron-right"></i>
      </button>
    </li>

    <li>
      <button
        type="button"
        class="px-4 py-2 text-black border border-gray-400 rounded cursor-pointer hover:bg-gray-100 disabled:opacity-50 disabled:cursor-not-allowed"
        (click)="changePage(totalPages())"
        [disabled]="currentPage() === totalPages()"
      >
        <i class="bx bx-last"></i>
      </button>
    </li>
  </ul>
</nav>
