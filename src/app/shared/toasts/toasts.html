<div class="fixed bottom-4 right-4 z-50 flex flex-col space-y-3">
  @for (toast of activeToasts(); track toast.id) {
    <div
      class="p-4 max-w-sm rounded"
      [ngClass]="{
        'bg-green-100 text-green-800': toast.type === 'success',
        'bg-blue-100 text-blue-800': toast.type === 'info',
        'bg-orange-100 text-orange-800': toast.type === 'warning',
        'bg-red-100 text-red-800': toast.type === 'error',
      }"
      role="alert"
    >
      <span>{{ toast.message }}</span>
    </div>
  }
</div>
